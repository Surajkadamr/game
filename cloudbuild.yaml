substitutions:
  _REGION: asia-south1
  _TAG: latest            # overridden to $COMMIT_SHA when triggered by git push
  _SOCKET_URL: https://kadam-socket-server-placeholder.run.app  # override at trigger level
  _APP_URL: https://kadam-web-placeholder.run.app               # override at trigger level
  _LIVEKIT_URL: ''      # LiveKit server URL (e.g. wss://your-livekit.example.com)

steps:
  # ── Build socket-server image ────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build-socket
    args:
      - 'build'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/kadam/socket-server:${_TAG}'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/kadam/socket-server:latest'
      - '-f'
      - 'apps/socket-server/Dockerfile'
      - '.'

  # ── Build web image (NEXT_PUBLIC vars baked in at build time) ────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build-web
    args:
      - 'build'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/kadam/web:${_TAG}'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/kadam/web:latest'
      - '-f'
      - 'apps/web/Dockerfile'
      - '--build-arg'
      - 'NEXT_PUBLIC_SOCKET_URL=${_SOCKET_URL}'
      - '--build-arg'
      - 'NEXT_PUBLIC_APP_URL=${_APP_URL}'
      - '.'
    waitFor: ['-']  # run in parallel with build-socket

  # ── Push images ──────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: push-socket
    args: ['push', '--all-tags', 'asia-south1-docker.pkg.dev/$PROJECT_ID/kadam/socket-server']
    waitFor: ['build-socket']

  - name: 'gcr.io/cloud-builders/docker'
    id: push-web
    args: ['push', '--all-tags', 'asia-south1-docker.pkg.dev/$PROJECT_ID/kadam/web']
    waitFor: ['build-web']

  # ── Deploy socket-server to Cloud Run ───────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-socket
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'kadam-socket-server'
      - '--image=asia-south1-docker.pkg.dev/$PROJECT_ID/kadam/socket-server:${_TAG}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=1'
      - '--port=3001'
      - '--timeout=3600'
      - '--session-affinity'
      - '--set-env-vars=NODE_ENV=production,CORS_ORIGIN=${_APP_URL},LIVEKIT_URL=${_LIVEKIT_URL}'
      - '--set-secrets=JWT_SECRET=kadam-jwt-secret:latest,LIVEKIT_API_KEY=kadam-livekit-api-key:latest,LIVEKIT_API_SECRET=kadam-livekit-api-secret:latest'
    waitFor: ['push-socket']

  # ── Deploy web to Cloud Run ──────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-web
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'kadam-web'
      - '--image=asia-south1-docker.pkg.dev/$PROJECT_ID/kadam/web:${_TAG}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--port=3000'
      - '--set-env-vars=NODE_ENV=production'
    waitFor: ['push-web']

images:
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/kadam/socket-server:${_TAG}'
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/kadam/web:${_TAG}'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
