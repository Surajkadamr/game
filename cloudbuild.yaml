substitutions:
  _REGION: asia-south1
  _REPO: asia-south1-docker.pkg.dev/$PROJECT_ID/kadam
  _SOCKET_URL: https://kadam-socket-server-placeholder.run.app  # override at trigger level
  _APP_URL: https://kadam-web-placeholder.run.app               # override at trigger level

steps:
  # ── Build socket-server image ────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build-socket
    args:
      - 'build'
      - '-t'
      - '${_REPO}/socket-server:$COMMIT_SHA'
      - '-t'
      - '${_REPO}/socket-server:latest'
      - '-f'
      - 'apps/socket-server/Dockerfile'
      - '.'

  # ── Build web image (NEXT_PUBLIC vars baked in at build time) ────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build-web
    args:
      - 'build'
      - '-t'
      - '${_REPO}/web:$COMMIT_SHA'
      - '-t'
      - '${_REPO}/web:latest'
      - '-f'
      - 'apps/web/Dockerfile'
      - '--build-arg'
      - 'NEXT_PUBLIC_SOCKET_URL=${_SOCKET_URL}'
      - '--build-arg'
      - 'NEXT_PUBLIC_APP_URL=${_APP_URL}'
      - '.'
    waitFor: ['-']  # run in parallel with build-socket

  # ── Push images ──────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: push-socket
    args: ['push', '--all-tags', '${_REPO}/socket-server']
    waitFor: ['build-socket']

  - name: 'gcr.io/cloud-builders/docker'
    id: push-web
    args: ['push', '--all-tags', '${_REPO}/web']
    waitFor: ['build-web']

  # ── Deploy socket-server to Cloud Run ───────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-socket
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'kadam-socket-server'
      - '--image=${_REPO}/socket-server:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=1'
      - '--port=3001'
      - '--timeout=3600'
      - '--session-affinity'
      - '--set-env-vars=NODE_ENV=production,CORS_ORIGIN=${_APP_URL}'
      - '--set-secrets=JWT_SECRET=kadam-jwt-secret:latest'
    waitFor: ['push-socket']

  # ── Deploy web to Cloud Run ──────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-web
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'kadam-web'
      - '--image=${_REPO}/web:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--port=3000'
      - '--set-env-vars=NODE_ENV=production'
    waitFor: ['push-web']

images:
  - '${_REPO}/socket-server:$COMMIT_SHA'
  - '${_REPO}/web:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
